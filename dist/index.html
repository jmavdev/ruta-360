<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    <title>Ruta360 - Login Corporativo</title>
    <style>
        /* Estilos dinámicos para el botón corporativo ITRANS */
        .btn-ruta360 {
            background-color: #B91C1C !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
        }
        /* Efecto al pasar el mouse */
        .btn-ruta360:hover {
            background-color: #991B1B !important;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(185, 28, 28, 0.4);
        }
        /* Efecto al hacer foco (click o tabulación) */
        .btn-ruta360:focus {
            outline: none;
            background-color: #7F1D1D !important;
            box-shadow: 0 0 0 4px rgba(185, 28, 28, 0.4);
        }
        /* Efecto al presionar */
        .btn-ruta360:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body style="margin:0; background-color: #adadad;" class="min-h-screen font-sans flex items-center justify-center lg:block overflow-x-hidden lg:overflow-hidden">

    <div class="flex flex-col lg:flex-row h-full lg:h-screen w-full">

        <div style="background-image: url('./assets/img/login/login_red.jpg'); 
                    background-size: cover; 
                    background-position: center; 
                    background-color: #B91C1C; 
                    background-blend-mode: multiply; 
                    position: relative;" 
             class="hidden lg:flex lg:w-[70%] items-center justify-center">
            <div style="position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 0%, rgba(31, 41, 55, 0.4) 100%); z-index: 1;"></div>
        </div>

        <div style="background-color: #adadad;" 
             class="w-full lg:w-[30%] flex items-center justify-center p-6 lg:p-8 min-h-screen lg:min-h-0">
            
            <div style="background-color: #FFFFFF; border-radius: 60px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);" 
                 class="w-full max-w-[420px] p-10 lg:p-14 text-center">
                
                <div class="mb-8 flex justify-center">
                    <img src="./assets/img/login/logo.png" style="height: 85px; lg:height: 105px; width: auto;" alt="Logo RUTA360">
                </div>

                <div class="mb-10 text-left">
                    <h2 style="font-size: 24px; font-weight: 900; color: #1F2937; text-transform: uppercase; font-style: italic; margin: 0;">LOGIN</h2>
                    <p style="color: #9CA3AF; font-size: 14px; margin-top: 5px; font-style: italic;">Ingrese sus credenciales</p> 
                </div>

                <form class="flex flex-col gap-8 text-left">
                    <div style="border-bottom: 2px solid #1F2937;">
                        <label class="block text-[11px] font-bold text-[#9CA3AF] uppercase tracking-widest mb-1">Usuario</label>
                        <input type="text" class="w-full py-2 outline-none bg-transparent text-[#1F2937]">
                    </div>

                    <div style="border-bottom: 2px solid #1F2937;">
                        <label class="block text-[11px] font-bold text-[#9CA3AF] uppercase tracking-widest mb-1">Contraseña</label>
                        <input type="password" class="w-full py-2 outline-none bg-transparent text-[#1F2937]">
                    </div>

                    <button type="submit" 
                            style="letter-spacing: 0.25em;" 
                            class="btn-ruta360 w-full py-5 text-white font-black text-xs uppercase rounded-xl mt-4">
                        THIS IS A BUTTON
                    </button>
                </form>

                <div class="mt-12 pt-6 border-t border-gray-100 flex justify-between text-[10px] font-black text-[#9CA3AF] uppercase">
                    <span>Recuperar contraseña</span>
                    <span>Ruta360 - 2026 [cite: 23]</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
